<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Online Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            Online Quiz System
        </a>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Online Quiz
    </h1>

    <form action="/submit-quiz" method="post">

        <div th:each="q : ${questions}"
             class="card mb-4 shadow">

            <div class="card-body">

                <h5 class="mb-3"
                    th:text="${q.questionText}">
                </h5>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:name="${q.id}"
                           th:value="${q.optionA}">
                    <label class="form-check-label"
                           th:text="${q.optionA}">
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:name="${q.id}"
                           th:value="${q.optionB}">
                    <label class="form-check-label"
                           th:text="${q.optionB}">
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:name="${q.id}"
                           th:value="${q.optionC}">
                    <label class="form-check-label"
                           th:text="${q.optionC}">
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:name="${q.id}"
                           th:value="${q.optionD}">
                    <label class="form-check-label"
                           th:text="${q.optionD}">
                    </label>
                </div>

            </div>

        </div>

        <button type="submit"
                class="btn btn-primary">
            Submit Quiz
        </button>
        <div class="alert alert-danger">
    Time Left:
    <span id="timer">30</span>
</div>
<script>

let time = 30;

let x = setInterval(function() {

    document.getElementById("timer").innerHTML = time;

    time--;

    if(time < 0){

        clearInterval(x);

        document.forms[0].submit();
    }

},1000);

</script>
            <a href="/"
               class="btn btn-primary mt-3">
                Back To Home
            </a>


    </form>

</div>

</body>
</html>
