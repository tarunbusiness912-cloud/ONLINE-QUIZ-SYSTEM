<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Question</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            Online Quiz System
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card">

        <div class="card-header bg-warning">
            Edit Question
        </div>

        <div class="card-body">

            <form th:action="@{/update-question}"
                  th:object="${question}"
                  method="post">

                <input type="hidden"
                       th:field="*{id}">

                <div class="mb-3">
                    <label>Question</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{questionText}">
                </div>

                <div class="mb-3">
                    <label>Option A</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{optionA}">
                </div>

                <div class="mb-3">
                    <label>Option B</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{optionB}">
                </div>

                <div class="mb-3">
                    <label>Option C</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{optionC}">
                </div>

                <div class="mb-3">
                    <label>Option D</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{optionD}">
                </div>

                <div class="mb-3">
                    <label>Correct Answer</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{correctAnswer}">
                </div>

                <button type="submit"
                        class="btn btn-success">
                    Update Question
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
